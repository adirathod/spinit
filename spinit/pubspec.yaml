name: spinit
description: "SpinIt - A fun wheel spinner app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  confetti: ^0.7.0
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.4.9
  audioplayers: ^5.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  uuid: ^4.3.3
  http: ^1.2.1
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/

